<div class="max-w-[1440px] mx-auto px-4 py-4 sm:px-6 lg:px-8">
  <h1
    class="capitalize font-semibold text-blue-400 text-center text-3xl lg:text-4xl my-12"
  >
    Create new appointment
  </h1>
  <div
    class="flex flex-col sm:flex-row gap-2 justify-between items-center bg-blue-50 rounded-lg p-4"
  >
    <div class="flex flex-col sm:flex-row gap-4 w-full">
      <input
        class="input"
        [(ngModel)]="newAppointmentTitle"
        type="text"
        placeholder="Appointment description"
      />
      <input
        class="input"
        [(ngModel)]="newAppointmentDate"
        type="date"
        placeholder="Appointment date"
      />
    </div>
    <button class="btn-primary w-full sm:w-fit" (click)="addAppointment()">
      Add
    </button>
  </div>
  @if (appointments.length) {
    <ul class="flex flex-col gap-6 mt-8">
      @for (appointment of appointments; track appointment.id) {
        <li
          class="flex flex-col sm:flex-row gap-2 justify-between hover:bg-gray-100 px-2 py-4 rounded-lg items-center"
        >
          <p class="w-full text-center sm:w-1/3 sm:text-start break-words">
            {{ appointment.title }}
          </p>
          <p>
            {{ appointment.date | date: "fullDate" }}
          </p>
          <button
            class="btn-danger"
            (click)="deleteAppointment(appointment.id)"
          >
            Delete
          </button>
        </li>
      }
    </ul>
  } @else {
    <p class="bg-gray-100 px-2 py-4 rounded-lg text-center mt-8">
      No appointments yet.
    </p>
  }
</div>
